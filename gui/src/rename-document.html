<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rename Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .modal {
            background-color: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #007bff;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            color: #333;
            margin: 0;
            font-size: 22px;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        /* Стил за Document ID - често е фиксирано */
        .id-field {
            background-color: #f8f9fa;
            color: #6c757d;
            cursor: not-allowed;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s;
            outline: none;
            font-size: 15px;
        }

        input[type="text"]:focus:not(.id-field) {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.1);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .rename-btn {
            background-color: #007bff;
            color: white;
        }

        .rename-btn:hover {
            background-color: #0056b3;
        }

        .cancel-btn {
            background-color: #f1f1f1;
            color: #555;
        }

        .cancel-btn:hover {
            background-color: #e2e2e2;
        }
    </style>
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <h2>✏️ Rename Document</h2>
        <p>Change the display name of your file</p>
    </div>

    <div class="form-group">
        <label for="doc-id">Document ID</label>
        <input type="text" id="doc-id" class="id-field" value="HARDCODED VALUE" readonly>
    </div>

    <div class="form-group">
        <label for="new-name">New Document Name</label>
        <input type="text" id="new-name" placeholder="Enter new name..." autofocus>
    </div>

    <div class="actions">
        <button class="btn cancel-btn">Cancel</button>
        <button class="btn rename-btn" onclick="handleRename()">Save Changes</button>
    </div>
</div>

<script>
    function handleRename() {
        const newName = document.getElementById('new-name').value;
        const docId = document.getElementById('doc-id').value;

        if (!newName) {
            alert("Please enter a new name!");
        } else {
            alert(`Document ${docId} has been renamed to "${newName}"`);
        }
    }
</script>

</body>
</html>
