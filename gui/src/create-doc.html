<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Document Pop-up</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .modal {
            background-color: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #007bff; /* Акцент в синьо */
        }

        h2 {
            color: #333;
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload label {
            display: block;
            background-color: #e7f3ff;
            color: #007bff;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            border: 2px dashed #007bff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload label:hover {
            background-color: #007bff;
            color: white;
        }

        input[type="file"] {
            display: none;
        }

        /* Основен бутон за създаване */
        .submit-btn {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        /* Име на избрания файл */
        #file-name-display {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="modal">
    <h2>CREATE DOCUMENT</h2>

    <div class="form-group">
        <label for="doc-name">Document name</label>
        <input type="text" id="doc-name" placeholder="Enter name...">
    </div>

    <div class="form-group">
        <label>Upload file</label>
        <div class="file-upload">
            <label for="file-input" id="file-label">📁 Choose file</label>
            <input type="file" id="file-input" onchange="updateFileName()">
        </div>
        <span id="file-name-display">No file chosen</span>
    </div>

    <button class="submit-btn" onclick="createDoc()">CREATE</button>
</div>

<script>
    function updateFileName() {
        const input = document.getElementById('file-input');
        const display = document.getElementById('file-name-display');
        if (input.files.length > 0) {
            display.textContent = "Chosen file: " + input.files[0].name;
            display.style.color = "#28a745";
        }
    }

    function createDoc() {
        const name = document.getElementById('doc-name').value;
        if (name === "") {
            alert("Please, enter the name of the file!");
        } else {
            alert("Document '" + name + "' has been created successfully!");
        }
    }
</script>

</body>
</html>
