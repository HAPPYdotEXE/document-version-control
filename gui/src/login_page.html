<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Sync&Flow Login</title>

    <style>
        @import url("https://fonts.googleapis.com/css?family=Fira+Sans");

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Fira Sans", sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3); /* мек градиент */
        }

        .log-check { display: none; }

        .form-structor {
            background-color: #ffffff; /* чисто бяло за форма */
            border-radius: 15px;
            height: 540px;
            width: 350px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); /* мека сянка */
        }

        /* 🔥 Лого */
        .logo-inside {
            text-align: center;
            padding-top: 25px;
        }

        .logo-inside img {
            width: 180px;
        }

        .form-title {
            color: #333; /* по-тъмен, но мек */
            font-size: 1.6em;
            text-align: center;
            cursor: pointer;
            margin: 10px 0;
        }

        .form-title span {
            font-size: 0.6em;
            margin-right: 8px;
            opacity: 0.6;
            color: #555;
        }

        .form-holder {
            background-color: #f9f9f9; /* светло сиво за полетата */
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .input {
            width: 100%;
            border: none;
            outline: none;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
            background-color: transparent;
        }

        .submit-btn {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }


        .signup {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            z-index: 5;
            transition: 0.3s;
        }


        .login {
            position: absolute;
            top: 25%;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            z-index: 10;
            transition: 0.3s;
        }

        .login::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -20px;
            transform: translateX(-50%);
            width: 200%;
            height: 250px;
            background: #fff;
            border-radius: 50%;
        }

        .login .center {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            transition: 0.3s;
        }

        .login .form-title {
            color: #000;
        }

        /* SWITCH */
        #signup-trigger:checked ~ .form-structor .login {
            top: 85%;
        }

        #signup-trigger:checked ~ .form-structor .login .form-holder,
        #signup-trigger:checked ~ .form-structor .login .submit-btn {
            opacity: 0;
            visibility: hidden;
        }

        #signup-trigger:checked ~ .form-structor .login .center {
            top: 30px;
            transform: translate(-50%, 0);
        }

        #login-trigger:checked ~ .form-structor .login {
            top: 25%;
        }

        #login-trigger:checked ~ .form-structor .login .form-holder,
        #login-trigger:checked ~ .form-structor .login .submit-btn {
            opacity: 1;
            visibility: visible;
        }

        #login-trigger:checked ~ .form-structor .signup {
            top: 15%;
            transform: translate(-50%, 0);
        }

        #login-trigger:checked ~ .form-structor .signup .form-holder,
        #login-trigger:checked ~ .form-structor .signup .submit-btn {
            opacity: 0;
            visibility: hidden;
        }

    </style>
</head>
<body>

<input type="radio" name="form-switch" id="signup-trigger" class="log-check" checked>
<input type="radio" name="form-switch" id="login-trigger" class="log-check">

<div class="form-structor">

    <div class="logo-inside">
        <img src="logo- final.png" alt="Sync&Flow Logo" >
    </div>

    <div class="signup">
        <label for="signup-trigger" class="form-title">Sign up</label>
        <div class="form-holder">
            <input type="text" class="input" placeholder="Name">
            <input type="email" class="input" placeholder="Email">
            <input type="password" class="input" placeholder="Password">
        </div>
        <button class="submit-btn">Sign up</button>
    </div>

    <div class="login">
        <div class="center">
            <label for="login-trigger" class="form-title">Log in</label>
            <div class="form-holder">
                <input type="email" class="input" placeholder="Email">
                <input type="password" class="input" placeholder="Password">
            </div>
            <button class="submit-btn">Log in</button>
        </div>
    </div>

</div>

</body>
</html>
