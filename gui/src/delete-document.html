<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .modal {
            background-color: #ffffff;
            width: 380px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        /* Заглавие с икона на един ред */
        .modal-header {
            display: flex;
            align-items: center;
            gap: 8px; /* Разстояние между иконата и текста */
            margin-bottom: 10px;
        }

        .icon-small {
            font-size: 20px; /* Малка икона */
            color: #f0ad4e; /* Дискретно оранжево, а не крещящо червено */
        }

        h2 {
            color: #333;
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .description {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e1e1e1;
            border-radius: 6px;
            background-color: #fcfcfc;
            color: #333;
            font-size: 14px;
            outline: none;
            cursor: default;
        }

        .actions {
            display: flex;
            justify-content: flex-end; /* Бутоните са вдясно */
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .delete-btn {
            background-color: #007bff; /* Стандартно синьо за потвърждение */
            color: white;
        }

        .delete-btn:hover {
            background-color: #0056b3;
        }

        .cancel-btn {
            background-color: transparent;
            color: #777;
        }

        .cancel-btn:hover {
            color: #333;
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <span class="icon-small">🗑️</span> <h2>Delete Document</h2>
    </div>
    <p class="description">
        You are about to remove this document from the system. Please confirm the action.
    </p>

    <div class="form-group">
        <label>Document ID</label>
        <input type="text" value="HARDCODED VALUE" readonly>
    </div>

    <div class="actions">
        <button class="btn cancel-btn">Cancel</button>
        <button class="btn delete-btn" onclick="handleDelete()">Confirm Delete</button>
    </div>
</div>

<script>
    function handleDelete() {
        alert("Document deleted successfully.");
    }
</script>

</body>
</html>
