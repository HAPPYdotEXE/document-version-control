spring.application.name=sap

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
server.port=8081
# H2 console (access at http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=UWmBx8VpmyN9hsoOa5eSdvcZW97wjLi4mUV5cPFmjR8=
jwt.expiration=86400000
# 24h token expiration for development -> generally needs to be around 15mins for prod
