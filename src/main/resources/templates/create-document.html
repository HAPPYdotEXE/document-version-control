<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .modal {
            background-color: #ffffff;
            width: 460px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            border-top: 8px solid #4e7df0;
        }

        h2 {
            color: #333;
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            border-color: #4e7df0;
            background-color: #fcfdff;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .submit-btn {
            background-color: #4e7df0;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: #2f60dc;
            box-shadow: 0 4px 12px rgba(78, 125, 240, 0.3);
            transform: translateY(-1px);
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .success {
            background: #eafaf1;
            color: #1e7e34;
            border: 1px solid #b7ebc6;
        }

        .error {
            background: #fff0f0;
            color: #b42318;
            border: 1px solid #f3b0b0;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: #4e7df0;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="modal">
    <h2>Create Document</h2>

    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <form th:action="@{/documents/create}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Document name</label>
            <input type="text" id="name" name="name" placeholder="Enter document name...">
        </div>

        <div class="form-group">
            <label for="file">Upload file</label>
            <input type="file" id="file" name="file">
        </div>

        <div class="actions">
            <button class="submit-btn" type="submit">CREATE</button>
        </div>
    </form>

    <a class="back-link" th:href="@{/}">← Back to homepage</a>
</div>

</body>
</html>
