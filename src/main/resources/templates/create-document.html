<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Document</title>
    <link rel="stylesheet" th:href="@{/css/document-form.css}">
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <h2>Create Document</h2>
        <p>Upload a new TXT file and start version tracking for your document.</p>
    </div>

    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <form th:action="@{/documents/create}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Document name</label>
            <input type="text" id="name" name="name" placeholder="Enter document name...">
        </div>

        <div class="form-group">
            <label for="file">Upload file</label>
            <input type="file" id="file" name="file">
        </div>

        <div class="actions">
            <button class="submit-btn" type="submit">CREATE</button>
        </div>
    </form>

    <a class="back-link" th:href="@{/}">← Back to homepage</a>
</div>

</body>
</html>
