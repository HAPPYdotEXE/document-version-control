<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Document View</title>
    <link rel="stylesheet" th:href="@{/css/document-view.css}">
</head>
<body>
<div class="container">

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <div th:unless="${errorMessage}">
        <h1 th:text="${documentName}">Document name</h1>

        <div class="meta">
            <span>Version: </span>
            <span th:text="${versionNum}">1</span>
        </div>

        <div class="content-box" th:text="${content}">Document content...</div>
    </div>

    <a class="back-link" th:href="@{/}">← Back to homepage</a>
</div>
</body>
</html>
