<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Document View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef6fb;
            margin: 0;
            padding: 40px;
            color: #16324f;
        }

        .container {
            max-width: 980px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            color: #16324f;
        }

        .meta {
            font-size: 18px;
            color: #5b7188;
            margin-bottom: 20px;
        }

        .content-box {
            background: #f7fbff;
            border: 1px solid #cfe5f3;
            border-radius: 14px;
            padding: 20px;
            min-height: 140px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 18px;
            line-height: 1.6;
            color: #16324f;
        }

        .error {
            color: #b42318;
            background: #fff1f1;
            border: 1px solid #f1c0c0;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <div th:unless="${errorMessage}">
        <h1 th:text="${documentName}">Document name</h1>

        <div class="meta">
            <span>Version: </span>
            <span th:text="${versionNum}">1</span>
        </div>

        <div class="content-box" th:text="${content}">Document content...</div>
    </div>

    <a class="back-link" th:href="@{/}">← Back to homepage</a>
</div>
</body>
</html>
