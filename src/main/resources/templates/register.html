<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sync&Flow Login</title>
    <style>
        @import url("https://fonts.googleapis.com/css?family=Fira+Sans");

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Fira Sans", sans-serif;
            background: linear-gradient(135deg, #e6f9ff, #b3ecff);
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            width: 380px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .logo-inside {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-inside img {
            width: 220px;
        }

        .form-title {
            color: #333;
            font-size: 1.8em;
            text-align: center;
            margin-bottom: 20px;
        }

        .input {
            width: 100%;
            border: none;
            outline: none;
            padding: 12px;
            font-size: 14px;
            background-color: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 12px;
            display: block;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            margin-top: 5px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #0066cc, #00ccff);
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .error {
            background: #ffe2e2;
            color: #a30000;
        }

        .success {
            background: #e4f8ea;
            color: #0f7a3c;
        }

        .link-row {
            margin-top: 16px;
            text-align: center;
        }

        .link-row a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-inside">
        <img src="/images/logo-final.png" alt="Sync&Flow Logo">
    </div>

    <div class="form-title">Log in</div>

    <div th:if="${param.error}" class="message error">
        Invalid username or password.
    </div>

    <div th:if="${param.logout}" class="message success">
        You have been logged out.
    </div>

    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>

    <form th:action="@{/login}" method="post">
        <input class="input" type="text" name="username" placeholder="Username">
        <input class="input" type="password" name="password" placeholder="Password">
        <button class="submit-btn" type="submit">Log in</button>
    </form>

    <div class="link-row">
        No account yet? <a th:href="@{/register}">Register</a>
    </div>
</div>

</body>
</html>
