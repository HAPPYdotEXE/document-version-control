<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Document</title>
    <link rel="stylesheet" th:href="@{/css/delete-document.css}">
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <span class="icon-small">🗑️</span>
        <h2>Delete Document</h2>
    </div>

    <p class="description">
        You are about to permanently remove this document from the system.
        Please confirm the action.
    </p>

    <div class="form-group">
        <label>Document ID</label>
        <input type="text" th:value="${document.id}" readonly>
    </div>

    <div class="form-group">
        <label>Document Name</label>
        <input type="text" th:value="${document.name}" readonly>
    </div>

    <div class="actions">
        <a th:href="@{/}" class="btn cancel-btn">Cancel</a>

        <form th:action="@{/documents/{id}/delete(id=${document.id})}" method="post" style="margin:0;">
            <button type="submit" class="btn delete-btn">Confirm Delete</button>
        </form>
    </div>
</div>

</body>
</html>
