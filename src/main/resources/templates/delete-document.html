<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .modal {
            background-color: #ffffff;
            width: 420px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            text-align: left;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .icon-small {
            font-size: 22px;
            color: #dc2626;
        }

        h2 {
            color: #16324f;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .description {
            color: #5b7188;
            font-size: 15px;
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbe4ea;
            border-radius: 8px;
            background-color: #f9fcff;
            color: #16324f;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.25s;
            text-decoration: none;
        }

        .delete-btn {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(220, 38, 38, 0.2);
        }

        .cancel-btn {
            background-color: #f3f7fb;
            color: #41586f;
        }

        .cancel-btn:hover {
            background-color: #e9f2f8;
        }
    </style>
</head>
<body>

<div class="modal">
    <div class="modal-header">
        <span class="icon-small">🗑️</span>
        <h2>Delete Document</h2>
    </div>

    <p class="description">
        You are about to permanently remove this document from the system.
        Please confirm the action.
    </p>

    <div class="form-group">
        <label>Document ID</label>
        <input type="text" th:value="${document.id}" readonly>
    </div>

    <div class="form-group">
        <label>Document Name</label>
        <input type="text" th:value="${document.name}" readonly>
    </div>

    <div class="actions">
        <a th:href="@{/}" class="btn cancel-btn">Cancel</a>

        <form th:action="@{/documents/{id}/delete(id=${document.id})}" method="post" style="margin:0;">
            <button type="submit" class="btn delete-btn">Confirm Delete</button>
        </form>
    </div>
</div>

</body>
</html>
