<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <h1 class="page-title">User Management Panel</h1>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="container">
    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <div class="header">
        <h1>User Management Panel</h1>
        <div class="top-actions">
            <a th:href="@{/}">Back to Home</a>
        </div>
    </div>

    <table class="users-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="'#' + ${user.id}">#1</td>
            <td><strong th:text="${user.username}">username</strong></td>
            <td>
                <form class="role-form"
                      th:action="@{/admin/users/{id}/role(id=${user.id})}"
                      method="post">
                    <select class="role-select" name="role">
                        <option th:each="role : ${roles}"
                                th:value="${role.name()}"
                                th:text="${role.name()}"
                                th:selected="${user.roles != null and !user.roles.isEmpty() and user.roles[0].name() == role.name()}">
                        </option>
                    </select>
                    <button class="btn btn-save" type="submit">Save</button>
                </form>
            </td>
            <td>
                <button class="btn btn-view"
                        type="button"
                        th:attr="data-id=${user.id},
                                 data-username=${user.username},
                                 data-email=${user.email},
                                 data-role=${user.roles != null and !user.roles.isEmpty() ? user.roles[0].name() : 'NONE'},
                                 data-date=${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm') : 'N/A'}"
                        onclick="showProfile(this)">
                    View Profile
                </button>

                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                      method="post"
                      class="inline-form"
                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                    <button class="btn btn-delete" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="profile-modal">
        <div class="modal-header">
            <div class="avatar">👤</div>
            <h2 id="m-username">Username</h2>
            <div id="m-role-badge" class="role-badge">
                ROLE
            </div>
        </div>
        <div class="modal-body">
            <div class="info-row"><span class="label">User ID</span><span class="value" id="m-id">#0</span></div>
            <div class="info-row"><span class="label">Email</span><span class="value" id="m-email">email@example.com</span></div>
            <div class="info-row"><span class="label">Created At</span><span class="value" id="m-date">Date</span></div>
            <div class="info-row"><span class="label">Status</span><span class="value">Active User ✅</span></div>
        </div>
        <div class="modal-footer">
            <button class="close-btn" onclick="hideProfile()">Close</button>
        </div>
    </div>
</div>

<script>
    function showProfile(button) {
        document.getElementById('m-username').innerText = button.dataset.username;
        document.getElementById('m-id').innerText = '#' + button.dataset.id;
        document.getElementById('m-email').innerText = button.dataset.email;
        document.getElementById('m-role-badge').innerText = button.dataset.role;
        document.getElementById('m-date').innerText = button.dataset.date;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function hideProfile() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    window.onclick = function(event) {
        const overlay = document.getElementById('modalOverlay');
        if (event.target === overlay) {
            hideProfile();
        }
    }
</script>

</body>
</html>
