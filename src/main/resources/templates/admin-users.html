<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-blue: #0056b3;
            --bg-color: #f4f7f9;
            --text-gray: #666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--primary-blue); }

        .top-actions a {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            background: #eef4ff;
            color: var(--primary-blue);
            font-weight: 600;
        }

        .message {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .success {
            background: #eafaf1;
            color: #1e7e34;
            border: 1px solid #b7ebc6;
        }

        .error {
            background: #fff1f1;
            color: #b42318;
            border: 1px solid #f1b5b5;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8f9fa; color: var(--text-gray); padding: 15px; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 15px; vertical-align: middle; }

        .role-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .role-select {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #d1d1d1;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-save {
            background: var(--primary-blue);
            color: white;
        }

        .btn-view {
            background: #e7f3ff;
            color: var(--primary-blue);
            margin-right: 5px;
        }

        .btn-delete {
            background: #fff;
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .btn-delete:hover {
            background: #dc3545;
            color: #fff;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .profile-modal {
            background: #fff;
            width: 400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            padding: 25px;
            text-align: center;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            margin: 0 auto 10px;
            border: 2px solid white;
        }

        .modal-body { padding: 20px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            gap: 15px;
        }

        .label {
            color: #888;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .value {
            color: #333;
            font-size: 14px;
            text-align: right;
        }

        .modal-footer {
            padding: 15px;
            text-align: center;
        }

        .close-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <div class="header">
        <h1>User Management Panel</h1>
        <div class="top-actions">
            <a th:href="@{/}">Back to Home</a>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="'#' + ${user.id}">#1</td>
            <td><strong th:text="${user.username}">username</strong></td>
            <td>
                <form class="role-form"
                      th:action="@{/admin/users/{id}/role(id=${user.id})}"
                      method="post">
                    <select class="role-select" name="role">
                        <option th:each="role : ${roles}"
                                th:value="${role.name()}"
                                th:text="${role.name()}"
                                th:selected="${user.roles != null and !user.roles.isEmpty() and user.roles[0].name() == role.name()}">
                        </option>
                    </select>
                    <button class="btn btn-save" type="submit">Save</button>
                </form>
            </td>
            <td>
                <button class="btn btn-view"
                        type="button"
                        th:attr="data-id=${user.id},
                                 data-username=${user.username},
                                 data-email=${user.email},
                                 data-role=${user.roles != null and !user.roles.isEmpty() ? user.roles[0].name() : 'NONE'},
                                 data-date=${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm') : 'N/A'}"
                        onclick="showProfile(this)">
                    View Profile
                </button>

                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                      method="post"
                      style="display:inline;"
                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                    <button class="btn btn-delete" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="profile-modal">
        <div class="modal-header">
            <div class="avatar">👤</div>
            <h2 id="m-username">Username</h2>
            <div id="m-role-badge"
                 style="font-size: 12px; background: rgba(255,255,255,0.2); display: inline-block; padding: 2px 10px; border-radius: 10px;">
                ROLE
            </div>
        </div>
        <div class="modal-body">
            <div class="info-row"><span class="label">User ID</span><span class="value" id="m-id">#0</span></div>
            <div class="info-row"><span class="label">Email</span><span class="value" id="m-email">email@example.com</span></div>
            <div class="info-row"><span class="label">Created At</span><span class="value" id="m-date">Date</span></div>
            <div class="info-row"><span class="label">Status</span><span class="value">Active User ✅</span></div>
        </div>
        <div class="modal-footer">
            <button class="close-btn" onclick="hideProfile()">Close</button>
        </div>
    </div>
</div>

<script>
    function showProfile(button) {
        document.getElementById('m-username').innerText = button.dataset.username;
        document.getElementById('m-id').innerText = '#' + button.dataset.id;
        document.getElementById('m-email').innerText = button.dataset.email;
        document.getElementById('m-role-badge').innerText = button.dataset.role;
        document.getElementById('m-date').innerText = button.dataset.date;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function hideProfile() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    window.onclick = function(event) {
        const overlay = document.getElementById('modalOverlay');
        if (event.target === overlay) {
            hideProfile();
        }
    }
</script>

</body>
</html>
